<script src="script.js"></script>
<script>
function renderDetail() {
  var params = new URLSearchParams(window.location.search);
  var id = parseInt(params.get('id'));
  if (!id) { document.getElementById('detailContent').innerHTML = '<p style="text-align:center;padding:60px 20px;color:#999;">Produit introuvable.</p>'; return; }
  var p = products.find(function(x) { return x.id === id; });
  if (!p) {
    var checkExist = setInterval(function() {
      p = products.find(function(x) { return x.id === id; });
      if (p) { clearInterval(checkExist); renderProduct(p); }
    }, 200);
    return;
  }
  renderProduct(p);
}
function renderProduct(p) {
  var img = document.getElementById('detailImg');
  img.src = getProductImage(p);
  img.alt = pn(p.id) || p.name;
  document.getElementById('detailName').textContent = pn(p.id) || p.name;
  document.getElementById('detailPrice').textContent = fmt(p.price);
  document.getElementById('detailDesc').textContent = pd(p.id) || p.desc || '';
  var cat = document.getElementById('detailCat');
  var catLabel = { 'huiles': 'adminCatHuiles', 'soins': 'adminCatSoins', 'corps': 'adminCatCorps', 'coffrets': 'adminCatCoffrets' }[p.cat] || '';
  cat.textContent = catLabel ? t(catLabel) : p.cat || '';
  document.title = (pn(p.id) || p.name) + ' — LARACH BLOOM';
  document.getElementById('detailAddBtn').onclick = function() { add(p.id); };
  var waMsg = encodeURIComponent(t('waOrder') + ' "' + (pn(p.id) || p.name) + '"');
  document.getElementById('detailWaBtn').onclick = function() { window.open('https://wa.me/212755296253?text=' + waMsg, '_blank'); };
  var qtyVal = document.getElementById('qtyValue');
  var qty = 1;
  document.getElementById('qtyMinus').onclick = function() { if (qty > 1) { qty--; qtyVal.textContent = qty; } };
  document.getElementById('qtyPlus').onclick = function() { qty++; qtyVal.textContent = qty; };
}
document.addEventListener('DOMContentLoaded', function() { setTimeout(renderDetail, 50); });
</script>
